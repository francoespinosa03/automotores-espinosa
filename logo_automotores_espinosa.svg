<svg width="280" viewBox="0 0 280 290" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Logo Automotores Espinosa</title>
  <desc>Logo de Automotores Espinosa con escudo, silueta de auto y siglas AE</desc>
  <defs>
    <style>
      .shield-fill { fill: #1a1a2e; }
      .shield-stroke { fill: none; stroke: #c8a951; stroke-width: 3; }
      .accent { fill: #c8a951; }
      .accent-light { fill: #e8c96a; }
      .car-body { fill: #c8a951; }
      .car-detail { fill: #1a1a2e; }
    </style>
  </defs>

  <!-- Escudo -->
  <path d="M140 0 L280 0 L280 190 Q280 255 140 285 Q0 255 0 190 L0 0 Z" class="shield-fill"/>
  <path d="M140 6 L274 6 L274 190 Q274 250 140 279 Q6 250 6 190 L6 6 Z" class="shield-stroke"/>

  <!-- Banda dorada superior -->
  <path d="M6 6 L274 6 L274 62 L6 62 Z" class="accent" opacity="0.15"/>

  <!-- Silueta del auto -->
  <path d="M44 162 Q46 137 70 127 Q100 115 140 113 Q180 115 210 127 Q234 137 236 162 Z" class="car-body"/>
  <path d="M80 127 Q95 102 115 95 Q140 89 165 95 Q185 102 200 127 Z" class="car-body"/>
  <!-- Ventanas -->
  <path d="M160 125 Q178 107 196 125 Z" class="car-detail" opacity="0.6"/>
  <path d="M84 125 Q100 107 122 100 Q135 96 148 100 L155 125 Z" class="car-detail" opacity="0.6"/>
  <!-- Rueda delantera -->
  <circle cx="195" cy="165" r="22" fill="#1a1a2e"/>
  <circle cx="195" cy="165" r="16" class="accent"/>
  <circle cx="195" cy="165" r="8" fill="#1a1a2e"/>
  <circle cx="195" cy="165" r="3" class="accent"/>
  <!-- Rueda trasera -->
  <circle cx="85" cy="165" r="22" fill="#1a1a2e"/>
  <circle cx="85" cy="165" r="16" class="accent"/>
  <circle cx="85" cy="165" r="8" fill="#1a1a2e"/>
  <circle cx="85" cy="165" r="3" class="accent"/>
  <!-- Piso -->
  <rect x="44" y="162" width="192" height="8" rx="2" class="car-body"/>
  <!-- Faros -->
  <ellipse cx="233" cy="155" rx="7" ry="5" class="accent-light"/>
  <ellipse cx="47" cy="155" rx="7" ry="5" fill="#c0392b"/>

  <!-- Línea divisoria -->
  <line x1="20" y1="180" x2="260" y2="180" stroke="#c8a951" stroke-width="1.5" opacity="0.5"/>

  <!-- AE -->
  <text x="140" y="230" font-family="sans-serif" font-size="52" font-weight="900" text-anchor="middle" fill="#ffffff" letter-spacing="8">AE</text>

  <!-- Líneas decorativas -->
  <line x1="28" y1="220" x2="90" y2="220" stroke="#c8a951" stroke-width="1.2" opacity="0.8"/>
  <line x1="190" y1="220" x2="252" y2="220" stroke="#c8a951" stroke-width="1.2" opacity="0.8"/>

  <!-- EST. 1987 -->
  <text x="140" y="258" font-family="sans-serif" font-size="11" font-weight="400" text-anchor="middle" fill="#c8a951" letter-spacing="4">EST. 1987</text>
</svg>
